<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java+Vue 项目知识库智能体</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 引入 marked.js 用于渲染 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 - 会话历史 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>💬 会话历史</h2>
                <button id="newChatBtn" class="new-chat-btn">+ 新建对话</button>
            </div>
            <div id="sessionList" class="session-list">
                <!-- 动态加载会话列表 -->
            </div>
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span id="apiStatus" class="status-dot offline"></span>
                    <span id="apiStatusText">检查连接中...</span>
                </div>
            </div>
        </aside>

        <!-- 主聊天区域 -->
        <main class="chat-main">
            <div class="chat-header">
                <h1>🤖 项目知识库智能体</h1>
                <p>基于 Java + Vue 代码库的智能问答助手</p>
            </div>

            <div id="chatMessages" class="chat-messages">
                <div class="welcome-message">
                    <div class="welcome-icon">🚀</div>
                    <h3>欢迎使用项目知识库智能体</h3>
                    <p>我可以帮你解答关于这个 Java + Vue 项目的任何问题，例如：</p>
                    <div class="example-questions">
                        <button class="example-btn">登录功能是怎么实现的？</button>
                        <button class="example-btn">用户管理的接口有哪些？</button>
                        <button class="example-btn">解释一下项目的整体架构</button>
                        <button class="example-btn">数据库连接是怎么配置的？</button>
                    </div>
                </div>
            </div>

            <div class="chat-input-container">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="输入你的问题，例如：帮我解释一下用户登录的流程..." rows="3"></textarea>
                    <button id="sendBtn" class="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                        发送
                    </button>
                </div>
                <div class="input-hint">
                    <span>✨ 支持多轮对话，AI 会结合项目代码回答</span>
                </div>
            </div>
        </main>
    </div>

    <!-- 加载提示模板 -->
    <template id="loadingTemplate">
        <div class="message assistant loading">
            <div class="message-avatar">🤖</div>
            <div class="message-content">
                <div class="thinking-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </template>

    <script src="js/app.js"></script>
</body>
</html>
